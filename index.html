<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 생성기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🎱 로또 번호 생성기</h1>
      <p class="subtitle">균형 잡힌 번호 조합 5세트 자동 생성</p>
    </header>

    <main>
      <button id="generateBtn" class="btn-generate">번호 생성하기</button>

      <section id="results" class="results hidden">
        <div id="sets"></div>
        <button id="regenerateBtn" class="btn-regenerate">↺ 다시 생성</button>
      </section>
    </main>

    <footer>
      <p>합계 90~150 · 홀짝 균형 · 연속 최대 1쌍 · 구간 분산</p>
    </footer>
  </div>
  <script src="main.js"></script>
</body>
</html>
