<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 생성기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🎱 로또 번호 생성기</h1>
      <p class="subtitle">균형 잡힌 번호 조합 5세트 자동 생성</p>
    </header>

    <main>
      <button id="generateBtn" class="btn-generate">번호 생성하기</button>

      <section id="results" class="results hidden">
        <div id="sets"></div>
        <button id="regenerateBtn" class="btn-regenerate">↺ 다시 생성</button>
      </section>
    </main>

    <section class="inquiry-section">
      <h3>🤝 제휴 문의</h3>
      <p class="inquiry-desc">비즈니스 제휴 및 기타 문의사항을 남겨주세요.</p>
      <form action="https://formspree.io/f/xpqbjagz" method="POST" class="inquiry-form">
        <div class="form-group">
          <label for="name">이름</label>
          <input type="text" id="name" name="name" placeholder="성함 또는 업체명" required />
        </div>
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" placeholder="example@email.com" required />
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 입력해주세요." required></textarea>
        </div>
        <button type="submit" class="btn-submit">문의하기</button>
      </form>
    </section>

    <section class="comments-section" style="margin-top: 48px; padding-top: 32px; border-top: 1px solid #ddd;">
      <h3 style="text-align: center; margin-bottom: 24px;">💬 댓글</h3>
      <div id="disqus_thread"></div>
      <script>
          /**
          *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
          *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
          /*
          var disqus_config = function () {
          this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
          this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
          };
          */
          (function() { // DON'T EDIT BELOW THIS LINE
          var d = document, s = d.createElement('script');
          s.src = 'https://productbuilder-dyw90mxwxh.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>

    <footer>
      <p>합계 90~150 · 홀짝 균형 · 연속 최대 1쌍 · 구간 분산</p>
    </footer>
  </div>
  <script src="main.js"></script>
</body>
</html>
