<!DOCTYPE html>
<html lang="ko">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4825324689294427"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>동물상 테스트 & 로또 생성기</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* 동물상 테스트 섹션 스타일 */
    .animal-test-section {
      margin-top: 48px;
      padding: 32px 20px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-align: center;
    }
    .upload-area {
      margin: 24px 0;
      padding: 40px;
      border: 2px dashed #ddd;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafa;
      position: relative;
    }
    .upload-area:hover {
      border-color: var(--primary);
      background: #fff5f5;
    }
    .btn-select-photo {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 20px;
      background: var(--text);
      color: #fff;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
    }
    #image-preview {
      max-width: 100%;
      max-height: 300px;
      border-radius: 8px;
      display: none;
      margin: 0 auto 20px;
    }
    .result-message {
      font-size: 1.5rem;
      font-weight: 800;
      margin-top: 20px;
      color: var(--primary);
      line-height: 1.4;
    }
    .result-explain {
      font-size: 1rem;
      color: var(--text);
      margin-top: 12px;
      padding: 16px;
      background: #f0f0f0;
      border-radius: 12px;
      line-height: 1.6;
      word-break: keep-all;
      display: none;
    }
    .model-status {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 10px;
    }
    .loading-spinner {
      display: none;
      margin: 20px auto;
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🐶 동물상 테스트</h1>
      <p class="subtitle">나와 닮은 동물은 강아지? 고양이?</p>
      <div id="model-status" class="model-status">AI 모델을 준비하고 있습니다...</div>
    </header>

    <main>
      <!-- 동물상 테스트 섹션 -->
      <section class="animal-test-section">
        <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
          <div id="upload-content">
            <p style="font-size: 2rem; margin-bottom: 8px;">📸</p>
            <p>사진을 업로드하거나 찍어주세요</p>
            <span class="btn-select-photo">사진 선택하기</span>
          </div>
          <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
          <img id="image-preview" src="#" alt="Preview">
        </div>
        <div id="loading" class="loading-spinner"></div>
        <div id="label-container" class="result-message"></div>
        <div id="result-explain" class="result-explain"></div>
      </section>

      <hr style="margin: 60px 0; border: 0; border-top: 1px solid #ddd;">

      <header>
        <h1>🎱 로또 번호 생성기</h1>
        <p class="subtitle">균형 잡힌 번호 조합 5세트 자동 생성</p>
      </header>
      <button id="generateBtn" class="btn-generate">번호 생성하기</button>

      <section id="results" class="results hidden">
        <div id="sets"></div>
        <button id="regenerateBtn" class="btn-regenerate">↺ 다시 생성</button>
      </section>
    </main>

    <section class="inquiry-section">
      <h3>🤝 제휴 문의</h3>
      <p class="inquiry-desc">비즈니스 제휴 및 기타 문의사항을 남겨주세요.</p>
      <form action="https://formspree.io/f/xpqbjagz" method="POST" class="inquiry-form">
        <div class="form-group">
          <label for="name">이름</label>
          <input type="text" id="name" name="name" placeholder="성함 또는 업체명" required />
        </div>
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" placeholder="example@email.com" required />
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 입력해주세요." required></textarea>
        </div>
        <button type="submit" class="btn-submit">문의하기</button>
      </form>
    </section>

    <section class="comments-section" style="margin-top: 48px; padding-top: 32px; border-top: 1px solid #ddd;">
      <h3 style="text-align: center; margin-bottom: 24px;">💬 댓글</h3>
      <div id="disqus_thread"></div>
      <script>
          (function() {
          var d = document, s = d.createElement('script');
          s.src = 'https://productbuilder-dyw90mxwxh.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
    </section>

    <footer>
      <p>합계 90~150 · 홀짝 균형 · 연속 최대 1쌍 · 구간 분산</p>
    </footer>
  </div>

  <!-- Teachable Machine Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/D3tN8Adax/";
    let model, maxPredictions;

    // 페이지 로드 시 모델 미리 로드
    async function init() {
      try {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();
        const statusEl = document.getElementById('model-status');
        if (statusEl) {
          statusEl.innerHTML = "✅ AI 모델 준비 완료";
          statusEl.style.color = "#5cb85c";
        }
      } catch (e) {
        console.error("모델 로딩 실패:", e);
        const statusEl = document.getElementById('model-status');
        if (statusEl) statusEl.innerHTML = "⚠️ AI 모델을 불러오지 못했습니다.";
      }
    }
    
    // 즉시 실행
    init();

    async function handleImageUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function(e) {
        const img = document.getElementById('image-preview');
        img.src = e.target.result;
        img.style.display = 'block';
        document.getElementById('upload-content').style.display = 'none';
        
        document.getElementById('loading').style.display = 'block';
        document.getElementById("label-container").innerHTML = "";
        document.getElementById("result-explain").style.display = 'none';
        
        // 모델이 아직 로딩 중이라면 대기
        if (!model) {
          document.getElementById("label-container").innerHTML = "모델 로딩 중...";
          let checkInterval = setInterval(async () => {
            if (model) {
              clearInterval(checkInterval);
              await predict(img);
              document.getElementById('loading').style.display = 'none';
            }
          }, 500);
        } else {
          await predict(img);
          document.getElementById('loading').style.display = 'none';
        }
      };
      reader.readAsDataURL(file);
    }

    async function predict(imageElement) {
      const prediction = await model.predict(imageElement);
      prediction.sort((a, b) => b.probability - a.probability);
      
      const result = prediction[0].className;
      const prob = Math.round(prediction[0].probability * 100);
      
      const isDog = result === '강아지' || result === 'dog';
      let emoji = isDog ? '🐶' : '🐱';
      
      const explainEl = document.getElementById("result-explain");
      const labelEl = document.getElementById("label-container");
      
      labelEl.innerHTML = `${emoji} 당신은 ${prob}% 확률로 ${isDog ? '강아지' : '고양이'}상입니다!`;
      
      const explanations = {
        dog: [
          "초롱초롱한 눈망울과 다정한 분위기를 가지셨네요! 보는 사람마저 기분 좋게 만드는 긍정 에너지가 넘쳐납니다. 누구에게나 사랑받는 '인싸' 기질이 다분하시군요!",
          "충성심 강하고 정이 많은 강아지처럼, 주변 사람들을 잘 챙기는 따뜻한 마음씨의 소유자시네요. 꼬리를 살랑이는 강아지처럼 귀여운 매력이 뿜뿜!",
          "활발하고 에너지가 넘치는 당신! 주변에 항상 웃음꽃을 피우는 매력쟁이시네요. 당신의 밝은 미소는 모두를 행복하게 만드는 마법이 있어요."
        ],
        cat: [
          "도도하면서도 신비로운 분위기가 매력적이시네요! 처음엔 차가워 보일 수 있지만, 알면 알수록 빠져드는 '츤데레' 같은 매력을 가지셨군요. 당신의 눈빛에 다들 심쿵!",
          "조용하면서도 자기 주관이 뚜렷한 고양이처럼, 독립심 강하고 세련된 이미지를 풍기시네요. 가끔 보여주는 의외의 애교가 사람들을 무장해제 시킵니다.",
          "차분하고 지적인 매력이 넘치는 당신! 혼자만의 시간도 즐길 줄 아는 여유로운 모습이 고양이와 꼭 닮았어요. 당신의 깊은 눈매에 신비로움이 가득하네요."
        ]
      };
      
      const list = isDog ? explanations.dog : explanations.cat;
      const randomExplain = list[Math.floor(Math.random() * list.length)];
      
      explainEl.innerHTML = randomExplain;
      explainEl.style.display = 'block';
    }
  </script>
  <script src="main.js"></script>
</body>
</html>
